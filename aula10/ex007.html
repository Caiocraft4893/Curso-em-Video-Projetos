<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somando Números</title>
    <style>
        body {
            font: normal 20pt google sans;
        }
        input {
            font: normal 18pt google sans;
            width: 100px;
        }
        div#res {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Somando Valores</h1>
    <input type="number" name="txtn1" id="txtn1"> +
    <input type="number" name="txtn2" id="txtn2">
    <input type='button' value='Somar' onclick='somar()'>
    <div id="res">Resultado</div>
    <script>
        function somar() {
            var tn1 = window.document.getElementById('txtn1')
            var tn2 = window.document.querySelector('input#txtn2') // Aqui eu estou selecionando
            var res = window.document.getElementById('res') // a tag txtn2 com o querySelector
            var n1 = Number(tn1.value) // (usando a hashtag, pq é um id), a qual está dentro da
            var n2 = Number(tn2.value) // tag input!!
            var s = n1 + n2
            res.innerHTML = `A soma entre ${n1} e ${n2} é igual a <strong>${s}<strong/>`
        }
    </script>
</body>
</html>
