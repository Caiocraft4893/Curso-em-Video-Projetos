<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro programa em HTML</title>
    <style>
        body { 
            background-color: rgb(94, 94, 170);
            color: white; /* Comentário em CSS */
            font: normal 25pt Googles Sans;
        }
        h1 { 
            color: rgb(187, 187, 33)
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1> <!-- Isso é um comentário -->
    <p>Já me livrei da maldição</p>
    <script>
        var n1 = Number(window.prompt('Digite um número: ')) // recebe o valor como string
        var n2 = Number(window.prompt('Digite outro número: ')) // recebe o valor como string
        var s = n1 + n2
        window.alert(`A soma entre ${n1} e ${n2} é igual a ${s}`) // Também é concatenação, o sinal de +!
        // (number + number) - serve para adição 
        // (string + string) - serve para concatenação
    </script>
</body>
</html>
