<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro programa em HTML</title>
    <style>
        body { 
            background-color: rgb(94, 94, 170);
            color: white; /* Comentário em CSS */
            font: normal 25pt Googles Sans;
        }
        h1 { 
            color: rgb(187, 187, 33)
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1> <!-- Isso é um comentário -->
    <p>Já me livrei da maldição</p>
    <script>
        var nome = window.prompt("Qual é o seu nome?") // isso pergunta o nome
        window.alert('É um grande prazer em te conhecer, ' + nome + '!') // Isso é concatenação
    </script>
</body>
</html>
