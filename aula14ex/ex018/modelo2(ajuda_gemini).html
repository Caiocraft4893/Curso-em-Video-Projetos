<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada Dinâmica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">Gerador de Tabuada</h1>
    
    <!-- O formulário contendo o select -->
    <form id="formTabuada" class="space-y-4">
        <div>
            <label for="numero" class="block text-sm font-medium text-gray-700">Digite um número:</label>
            <input type="number" id="numero" name="numero" required
                   class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
        </div>

        <button type="button" onclick="gerarTabuada()"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition duration-200">
            Gerar Tabuada
        </button>

        <hr class="my-4">

        <div>
            <label for="selTabuada" class="block text-sm font-medium text-gray-700">Resultado da Tabuada:</label>
            <!-- O elemento Select onde as opções serão inseridas -->
            <select id="selTabuada" size="11" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 overflow-y-auto">
                <option>Digite um valor acima...</option>
            </select>
        </div>
    </form>
</div>

<script>
    function gerarTabuada() {
        // 1. Pegar o valor do input
        const numInput = document.getElementById('numero');
        const selectTabuada = document.getElementById('selTabuada');
        const n = Number(numInput.value);

        // Validação simples
        if (numInput.value.length === 0) {
            alert('Por favor, digite um número!');
            return;
        }

        // 2. Limpar o select antes de gerar a nova tabuada
        selectTabuada.innerHTML = '';

        // 3. Laço de repetição para gerar a tabuada (for)
        for (let i = 1; i <= 10; i++) {
            // Criar um novo elemento de opção
            let item = document.createElement('option');
            
            // Definir o texto que aparece para o usuário
            item.text = `${n} x ${i} = ${n * i}`;
            
            // Definir o valor interno (útil para formulários)
            item.value = `tab${i}`;
            
            // Adicionar a opção dentro do select
            selectTabuada.appendChild(item);
        }
    }
</script>

</body>
</html>
