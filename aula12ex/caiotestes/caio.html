<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu site</title>
    <style>
        body {
            background-color: rgb(10, 112, 10);
            font: normal 20pt google sans;
        }
        
        header {
            color: whitesmoke;
            text-align: center;
        
        }
        section {
            background-color: rgb(168, 155, 155); 
            border-radius: 20px;
            padding: 15px;
            width: 500px;
            margin: auto;
            text-align:center;
            box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.363);
            color: black;
        }

        div {
            text-align: center;
            padding: 8px;
        }
    </style>
</head>
<body onload="carregar()">
    <header>
        <h1>Se liga!</h1>
    </header>
    <section>
        <div id="msg">
            <p>Olha eu aqui!</p>
        </div id="foto"> 
            <img id="imagem" src="caio.jpg" alt="Minha foto">

        </div>
    </section>
    <script>
        function carregar() {
            var msg = document.getElementById('msg')
            var img = document.getElementById('imagem')
            var data = new Date()
            var hora = 22 // - use para testar o código!
            //var hora = data.getHours()
            msg.innerHTML = `Agora são ${hora} horas.`
            if (hora >= 0 && hora < 13) {
                img.src = 'foto_caio.png'
                document.body.style.background = '#9a6f5b'
                msg.innerHTML = 'O site é meu por 12 horas!' 
            } else {
                img.src = 'foto_caio_e_guil.png'
                document.body.style.background = '#56352e'
                msg.innerHTML = 'Agora o site é nosso por 12 horas!'
            }
        }
    </script>
</body>
</html>
